security:
    # Hash des passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    # Provider pour charger les users depuis la BDD
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        # Firewall pour les outils dev (profiler, wdt, assets)
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Firewall public pour register et login (stateless, JSON)
        auth:
            pattern: ^/api/(register|login_check)
            stateless: true
            json_login:
                check_path: /api/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
                username_path: email
                password_path: password
            # Pas de provider ici, car json_login gère l'auth

        # Firewall principal pour toutes les routes API protégées
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    # Règles d'accès
    access_control:
        - { path: ^/api/docs, roles: PUBLIC_ACCESS } # Swagger / OpenAPI ouvert
        - { path: ^/api/docs\..*$, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY } # tout le reste nécessite JWT valide
