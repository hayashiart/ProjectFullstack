security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Firewall pour /api/register et /api/login_check (public)
        auth:
            pattern: ^/api/(register|login_check)
            stateless: true
            json_login:
                check_path: api_login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Firewall pour le reste de l'API (protégé par JWT)
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        # Explicitement public (OPTIONS et POST sans auth)
        - { path: ^/api/register, roles: PUBLIC_ACCESS, methods: [POST, OPTIONS] }
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS, methods: [POST, OPTIONS] }

        # Tout le reste /api nécessite ROLE_USER (JWT valide)
        - { path: ^/api, roles: ROLE_USER }