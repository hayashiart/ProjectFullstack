nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['^http://(localhost|127\.0\.0\.1)(?::\d+)?$']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'Accept', 'Origin', 'X-Requested-With']
        expose_headers: ['Link', 'Authorization']
        max_age: 3600
        allow_credentials: true           # ← changé ici

    paths:
        '^/api':
            allow_origin: ['^http://(localhost|127\.0\.0\.1)(?::\d+)?$']
            allow_methods: ['*']
            allow_headers: ['*']
            max_age: 3600
            allow_credentials: true       # ← changé ici aussi